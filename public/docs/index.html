    function slug(s) {
      return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function escapeHtml(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function highlight(code, lang) {
      const P = window.Prism;
      if (P && lang && P.languages[lang]) {
        try { return P.highlight(code, P.languages[lang], lang); }
        catch { /* fall through */ }
      }
      return escapeHtml(code);

            language: 'php',
            code: `// app/Providers/TelemetryProvider.php
final class TelemetryProvider implements ServiceProvider
{
    public function before(Request $req, Response $res): void
    {
        // Pre-flight: bind request-scoped state, set headers, etc.
        Container::singleton(RequestId::class, fn() => RequestId::generate());
        $res->setHeader('X-Request-ID', RequestId::current());
    }

    public function after(Request $req, Response $res): void
    {
        // Post-response: response is already on the wire, safe to do
        // expensive work that shouldn't block the client.
        Metrics::flush($req, $res);
    }
}

// config/Providers.php  (your overlay)
return [
    \\App\\Providers\\TelemetryProvider::class,
];

// Order matters — providers fire in declaration order for before(),
// and the same order for after(). Distinct from middleware: providers
// wrap the whole request lifecycle (including the response send);
// middleware wraps only the controller call.`,

    function writeQ(q) {

        if (q) u.searchParams.set('q', q); else u.searchParams.delete('q');

    createApp({
      setup() {
        const query = ref(readQ());
        const activeId = ref(ALL[0]?.id || '');
        const copiedId = ref(null);
        let observer = null;

        /* Theme: light | dark | auto — synced with the rest of the app via
           the shared 'silverengine-theme' localStorage key. */
        const STORAGE_KEY = 'silverengine-theme';
        const theme = ref('auto');
        let mql = null;

        function readStoredTheme() {
          try {
            const v = localStorage.getItem(STORAGE_KEY);
            return (v === 'light' || v === 'dark' || v === 'auto') ? v : 'auto';
          } catch { return 'auto'; }
        }
        function applyTheme(choice) {
          const dark = choice === 'dark' || (choice === 'auto' && mql && mql.matches);
          document.documentElement.classList.toggle('dark', dark);
        }
        function setTheme(next) {
          theme.value = next;
          try { localStorage.setItem(STORAGE_KEY, next); } catch {}
          applyTheme(next);
        }
        function onSystemChange() {
          if (theme.value === 'auto') applyTheme('auto');
        }

        async function copyCode(id, text) {
          try {
            await navigator.clipboard.writeText(text);
            copiedId.value = id;
            setTimeout(() => { if (copiedId.value === id) copiedId.value = null; }, 1500);
          } catch {}
        }

        const groupedFiltered = computed(() => {
          const q = query.value.trim().toLowerCase();
          const terms = q ? q.split(/\s+/).filter(Boolean) : [];
          const match = (t) => {
            if (terms.length === 0) return true;
            const hay = (t.title + ' ' + t.tags.join(' ') + ' ' + t.body).toLowerCase();
            return terms.every(term => hay.includes(term));
          };
          return CATEGORIES
            .map(c => ({ name: c.name, topics: c.topics.filter(match) }))
            .filter(c => c.topics.length > 0);
        });

        const flatFiltered = computed(() =>
          groupedFiltered.value.flatMap(c => c.topics)
        );

                .sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
              if (visible[0]) activeId.value = visible[0].target.id;
            },
            { rootMargin: '-80px 0px -65% 0px', threshold: 0 }
          );

          if (el) {
            el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            history.replaceState(null, '', '#' + id);
            activeId.value = id;
          }
        }

        return {
          query, clear, groupedFiltered, flatFiltered,
          totalCount, activeId, jump, copyCode, copiedId,
          highlight, theme, setTheme,
        };
